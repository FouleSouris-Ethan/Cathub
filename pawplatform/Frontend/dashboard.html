<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPlatform — Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; }

        header {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 1.2rem; }
        header button {
            padding: 0.4rem 1rem;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            padding: 1.5rem 2rem 0;
        }
        .tab {
            padding: 0.5rem 1.5rem;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            background: #ddd;
            border: none;
            font-size: 1rem;
        }
        .tab.active { background: white; font-weight: 600; }

        .content {
            background: white;
            margin: 0 2rem;
            padding: 1.5rem;
            border-radius: 0 8px 8px 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .toolbar h2 { font-size: 1.1rem; }
        .btn-primary {
            padding: 0.5rem 1rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 0.75rem;
            font-size: 0.8rem;
            color: #666;
            border-bottom: 1px solid #eee;
        }
        td { padding: 0.75rem; border-bottom: 1px solid #f5f5f5; }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge.disponible { background: #dcfce7; color: #16a34a; }
        .badge.réservé { background: #fef9c3; color: #ca8a04; }
        .badge.adopté { background: #e0e7ff; color: #4f46e5; }
        .badge.en_attente { background: #fef9c3; color: #ca8a04; }
        .badge.validé { background: #dcfce7; color: #16a34a; }
        .badge.refusé { background: #fee2e2; color: #dc2626; }

        .action-btn {
            padding: 0.3rem 0.7rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 0.3rem;
            background: white;
        }
        .action-btn.danger { border-color: #dc2626; color: #dc2626; }
        .action-btn.success { border-color: #16a34a; color: #16a34a; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
        }
        .modal h3 { margin-bottom: 1.5rem; }
        .modal label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.25rem; }
        .modal input, .modal select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .btn-secondary {
            padding: 0.5rem 1rem;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .filter-btn {
            padding: 0.3rem 0.9rem;
            border: 1px solid #ddd;
            border-radius: 999px;
            background: white;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .filter-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

    </style>
</head>
<body>
    <header>
        <h1>🐾 PawPlatform</h1>
        <button onclick="logout()">Déconnexion</button>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="showTab('cats')">🐱 Chats</button>
        <button class="tab" onclick="showTab('applications')">📋 Dossiers</button>
    </div>

    <div class="content">

        <!-- Onglet Chats -->
<div id="tab-cats">
    <div class="toolbar">
        <h2>Chats</h2>
        <button class="btn-primary" onclick="openModal()">+ Ajouter un chat</button>
    </div>
    <div class="filters">
        <button class="filter-btn active" onclick="filterCats('tous')">Tous</button>
        <button class="filter-btn" onclick="filterCats('disponible')">Disponibles</button>
        <button class="filter-btn" onclick="filterCats('réservé')">Réservés</button>
        <button class="filter-btn" onclick="filterCats('adopté')">Adoptés</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>Nom</th>
                <th>Âge</th>
                <th>Race</th>
                <th>Description</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="cats-list">
            <tr><td colspan="6">Chargement...</td></tr>
        </tbody>
    </table>
</div>

        <!-- Onglet Dossiers -->
        <div id="tab-applications" style="display:none">
            <div class="toolbar">
                <h2>Dossiers d'adoption</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Adoptant</th>
                        <th>Email</th>
                        <th>Logement</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="applications-list">
                    <tr><td colspan="5">Chargement...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- Modal ajout chat -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3>Ajouter un chat</h3>
            <label>Nom</label>
            <input type="text" id="cat-name" placeholder="Moka" />
            <label>Âge (années)</label>
            <input type="number" id="cat-age" placeholder="2" />
            <label>Race</label>
            <input type="text" id="cat-race" placeholder="Européen" />
            <label>Description</label>
            <input type="text" id="cat-description" placeholder="Très câlin..." />
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">Annuler</button>
                <button class="btn-primary" onclick="handleCreateCat()">Ajouter</button>
            </div>
        </div>
    </div>

    <!-- Modal modfication d'un chat-->
    <div class="modal-overlay" id="modal-edit">
        <div class="modal">
            <h3>Modifier un chat</h3>
            <input type="hidden" id="edit-cat-id" />
            <label>Nom</label>
            <input type="text" id="edit-cat-name" placeholder="Moka" />
            <label>Âge (années)</label>
            <input type="number" id="edit-cat-age" placeholder="2" />
            <label>Race</label>
            <input type="text" id="edit-cat-race" placeholder="Européen" />
            <label>Description</label>
            <input type="text" id="edit-cat-description" placeholder="Très câlin..." />
            <label>Statut</label>
            <select id="edit-cat-status">
                <option value="disponible">Disponible</option>
                <option value="réservé">Réservé</option>
                <option value="adopté">Adopté</option>
            </select>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeEditModal()">Annuler</button>
                <button class="btn-primary" onclick="handleUpdateCat()">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
