<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawPlatform — Chats disponibles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; }

        header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 1.2rem; }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h2 { margin-bottom: 1.5rem; font-size: 1.3rem; }

        .cats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .cat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .cat-card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .cat-card p { color: #666; font-size: 0.9rem; margin-bottom: 0.3rem; }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        .badge.disponible { background: #dcfce7; color: #16a34a; }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 0.6rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            text-align: center;
            text-decoration: none;
            margin-top: 1rem;
        }
        .btn-primary:hover { background: #4338ca; }

        .empty { text-align: center; color: #666; margin-top: 3rem; }
    </style>
</head>
<body>
    <header>
        <h1>🐾 PawPlatform</h1>
    </header>

    <div class="container">
        <h2>Chats disponibles à l'adoption</h2>
        <div class="cats-grid" id="cats-grid">
            <p>Chargement...</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/cats.js"></script>
</body>
</html>
